# 知识管理 Vue 子应用 Nginx 配置
# 注意：Nginx 入口是 80 端口，Nginx 反代从父级 infra/nginx/nginx.conf 来
# 这里只处理 SPA 路由兜底（history 模式）

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 健康检查
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA 兜底：所有非文件请求都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 不缓存 index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires off;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
