server:
  port: ${KM_REPORT_PORT:9104}

spring:
  application:
    name: km-report-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:nacos:8848}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:knowledge}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

report:
  export:
    url-prefix: /api/v1/reports/files
  storage:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    access-key: ${MINIO_ACCESS_KEY:kmminio}
    secret-key: ${MINIO_SECRET_KEY:kmminio123}
    materials-bucket: ${REPORT_MATERIALS_BUCKET:report-materials}
    exports-bucket: ${REPORT_EXPORTS_BUCKET:report-exports}
  search:
    base-url: ${KM_SEARCH_BASE_URL:http://km-search-service:9103}
    internal-token: ${INTERNAL_TOKEN:demo-internal-token}
  llm:
    enabled: ${REPORT_LLM_ENABLED:false}
    base-url: ${REPORT_LLM_BASE_URL:}
    model: ${REPORT_LLM_MODEL:}
    timeout-seconds: ${REPORT_LLM_TIMEOUT_SECONDS:60}
    max-input-chars: ${REPORT_LLM_MAX_INPUT_CHARS:12000}
    max-output-tokens: ${REPORT_LLM_MAX_OUTPUT_TOKENS:2048}

management:
  endpoints:
    web:
      exposure:
        include: health,info
