services:
  mysql:
    image: mysql:8.0.32
    container_name: km-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: km
      MYSQL_USER: km
      MYSQL_PASSWORD: km123456
      TZ: Asia/Shanghai
    ports:
      # 本机 3306/33060 被 MySQL80 占用，改映射 33306 -> 容器 3306
      - "33306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../../sql/knowledge-base.sql:/docker-entrypoint-initdb.d/01_knowledge_base.sql:ro
      - ../../sql/document.sql:/docker-entrypoint-initdb.d/02_document.sql:ro
      - ../../sql/document-process-task.sql:/docker-entrypoint-initdb.d/04_document_process_task.sql:ro
      - ../../sql/document-status-log.sql:/docker-entrypoint-initdb.d/05_document_status_log.sql:ro
      - ../../sql/processed-event.sql:/docker-entrypoint-initdb.d/08_processed_event.sql:ro
      - ../../sql/document-version.sql:/docker-entrypoint-initdb.d/06_document_version.sql:ro
      - ../../sql/purge-audit.sql:/docker-entrypoint-initdb.d/09_purge_audit.sql:ro
      - ../../sql/review.sql:/docker-entrypoint-initdb.d/07_review.sql:ro

      # R17/V4：文档模块加法迁移
      - ../../sql/V3__document_module_integration.sql:/docker-entrypoint-initdb.d/10_V3__document_module_integration.sql:ro

      # R14/V4：用户 ID 统一为 UUID
      - ../../sql/V4__global_user_id_uuid.sql:/docker-entrypoint-initdb.d/11_V4__global_user_id_uuid.sql:ro

      # F6：系统配置
      - ../../sql/km-system-config.sql:/docker-entrypoint-initdb.d/12_km_system_config.sql:ro

      # F2：知识库管理加法迁移
      - ../../sql/V5__knowledge_base_management.sql:/docker-entrypoint-initdb.d/13_V5__knowledge_base_management.sql:ro

      # F5：REEMBED 内容版本
      - ../../sql/V6__f5_reembed_content_version.sql:/docker-entrypoint-initdb.d/14_V6__f5_reembed_content_version.sql:ro

      - ../../sql/init-demo.sql:/docker-entrypoint-initdb.d/99_init_demo.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ukm", "-pkm123456"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - km-net

  redis:
    image: redis:7.2
    container_name: km-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - km-net

  rabbitmq:
    image: rabbitmq:3.11.11-management
    container_name: km-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ../../infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ../../infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - km-net

  nacos:
    image: nacos/nacos-server:v2.2.0
    container_name: km-nacos
    environment:
      # demo 模式：去掉 mysql datasource，改用 nacos 自带内嵌 derby，避免缺 nacos schema 启动失败
      MODE: standalone
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8848/nacos/actuator/health | grep UP"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - km-net

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: km-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kmminio
      MINIO_ROOT_PASSWORD: kmminio123
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      # minio 镜像里没有 curl/wget，改用 bash + /dev/tcp 自检 S3 端口
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/9000 && echo -e \"GET /minio/health/live HTTP/1.0\\r\\n\\r\\n\" >&3'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - km-net

  minio-bucket-init:
    image: minio/mc:RELEASE.2024-01-13T08-44-48Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 kmminio kmminio123 &&
      mc mb -p local/km-files || true &&
      mc anonymous set none local/km-files"
    networks:
      - km-net

  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: km-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')\""]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - km-net

  fastapi-ai-service:
    build:
      context: ../..                       # 项目根目录作为 build context
      dockerfile: backend-python/km-ai-service/Dockerfile
    container_name: km-ai-service
    environment:
      # 内部接口认证
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-demo-internal-token}

      # 受限文件根目录
      ALLOWED_DOCUMENT_ROOT: /data/task-files

      # F5：FastAPI 容器通过 Docker 服务名访问 ChromaDB
      CHROMA_HOST: ${CHROMA_HOST:-chromadb}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-km_document_chunks}

      # F5：阿里云百炼 Embedding
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v4}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}

      # F5：阿里云百炼 Rerank
      RERANK_API_BASE: ${RERANK_API_BASE:-https://dashscope.aliyuncs.com/compatible-api/v1}
      RERANK_MODEL: ${RERANK_MODEL:-qwen3-rerank}

    volumes:
      - task-files:/data/task-files:ro

    depends_on:
      chromadb:
        condition: service_healthy

    # FastAPI 仅在 Docker 内部网络可访问
    expose:
      - "8000"
    networks:
      - km-net

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 20

  km-admin-service:
    build:
      context: ../..
      dockerfile: backend-java/knowledge-management/km-admin-service/Dockerfile
    container_name: km-admin-service
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/km?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      MYSQL_USER: km
      MYSQL_PASSWORD: km123456
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_VHOST: /km
      RABBITMQ_USER: km
      RABBITMQ_PASSWORD: km123456
      KM_AI_BASE_URL: http://fastapi-ai-service:8000
      INTERNAL_TOKEN: demo-internal-token
      NACOS_ADDR: nacos:8848
      # R8/V4 必改 4：admin 上传 MinIO 配置（与 worker 共享）
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: kmminio
      MINIO_SECRET_KEY: kmminio123
      MINIO_BUCKET: km-files
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_started
      minio:
        condition: service_healthy
    ports:
      - "9101:9101"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9101/actuator/health | grep UP"]
      interval: 15s
      timeout: 5s
      retries: 30
    networks:
      - km-net

  km-worker-service:
    build:
      context: ../..
      dockerfile: backend-java/knowledge-management/km-worker-service/Dockerfile
    container_name: km-worker-service
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_VHOST: /km
      RABBITMQ_USER: km
      RABBITMQ_PASSWORD: km123456
      REDIS_HOST: redis
      NACOS_ADDR: nacos:8848
      KM_ADMIN_BASE_URL: http://km-admin-service:9101
      KM_AI_BASE_URL: http://fastapi-ai-service:8000
      MAX_CONCURRENT_TASKS: 2
      # R8/V4 必改 4：Worker PURGE 链路需要删除 MinIO 对象
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: kmminio
      MINIO_SECRET_KEY: kmminio123
      MINIO_BUCKET: km-files
      # F6（commit #17b）：Worker 启动初始化拉取 admin 配置（与 admin 共用 INTERNAL_TOKEN，R33）
      INTERNAL_TOKEN: demo-internal-token
      # F4 整合（commit #23/24）：文件暂存根目录 + AI 超时（与 task-files 命名卷对应）
      TASK_FILE_ROOT: /data/task-files
      AI_CONNECT_TIMEOUT_MS: 5000
      AI_READ_TIMEOUT_MS: 30000
    volumes:
      # F4 commit #25：task-files 命名卷，Worker 读写
      - task-files:/data/task-files
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      km-admin-service:
        condition: service_healthy
      fastapi-ai-service:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "9102:9102"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9102/actuator/health | grep UP"]
      interval: 15s
      timeout: 5s
      retries: 30
    networks:
      - km-net

  km-search-service:
    build:
      context: ../..
      dockerfile: backend-java/knowledge-management/km-search-service/Dockerfile
    container_name: km-search-service
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/km?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      MYSQL_USER: km
      MYSQL_PASSWORD: km123456
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_VHOST: /km
      RABBITMQ_USER: km
      RABBITMQ_PASSWORD: km123456
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "9103:9103"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9103/actuator/health | grep UP"]
      interval: 15s
      timeout: 5s
      retries: 30
    networks:
      - km-net

  super-biz-agent-service:
    build:
      context: ../..
      dockerfile: backend-python/super-biz-agent-service/Dockerfile
    container_name: super-biz-agent-service
    environment:
      RETRIEVAL_SEARCH_URL: http://gateway-service:9000/internal/v1/retrieval/search
      DATABASE_URL: sqlite:////data/super_biz_agent.db
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_API_BASE: ${DASHSCOPE_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-max}
      DASHSCOPE_EMBEDDING_MODEL: ${DASHSCOPE_EMBEDDING_MODEL:-text-embedding-v4}
      PROMETHEUS_BASE_URL: ${PROMETHEUS_BASE_URL:-http://prometheus:9090}
    volumes:
      - super-biz-agent-data:/data
    ports:
      - "9900:9900"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9900/health')\""]
      interval: 15s
      timeout: 5s
      retries: 30
    networks:
      - km-net

  gateway-service:
    build:
      context: ../..
      dockerfile: backend-java/gateway-service/Dockerfile
    container_name: km-gateway-service
    environment:
      NACOS_ADDR: nacos:8848
      KM_ADMIN_URI: http://km-admin-service:9101
      KM_SEARCH_URI: http://km-search-service:9103
      SUPER_BIZ_AGENT_URI: http://super-biz-agent-service:9900
    depends_on:
      km-admin-service:
        condition: service_healthy
      km-search-service:
        condition: service_healthy
      super-biz-agent-service:
        condition: service_healthy
    ports:
      - "9000:9000"
    networks:
      - km-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/actuator/health | grep UP"]
      interval: 15s
      timeout: 5s
      retries: 30

  # R18：知识管理 Vue 子应用（Nginx 静态托管）
  # 浏览器通过 http://<nginx>/knowledge/ 反代访问本容器
  knowledge-web:
    build:
      context: ../../frontend/knowledge-web
      dockerfile: Dockerfile
    container_name: knowledge-web
    depends_on:
      - gateway-service
    networks:
      - km-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  nginx:
    image: nginx:1.25
    container_name: km-nginx
    ports:
      - "8080:80"
    volumes:
      - ../../infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      gateway-service:
        condition: service_healthy
      knowledge-web:
        condition: service_healthy
    networks:
      - km-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mysql-data:
  minio-data:
  chroma-data:
  super-biz-agent-data:
  # F4 整合（commit #25）：task-files 命名卷（Worker 写 / FastAPI 读）
  task-files:

networks:
  km-net:
    driver: bridge
